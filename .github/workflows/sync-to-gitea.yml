name: Sync to Gitea
# sync-version: 5

on:
  push:
    branches:
      - '**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitea (skip if paused, Gitea ahead, or diverged)
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_SYNC_TOKEN }}
        run: |
          # Resolve Gitea repo name. Two naming conventions exist:
          #   - New (current):  ceo/{ghuser}-{repo}     (provisionCoolifyApp)
          #   - Legacy:         ceo/{repo}              (early ai-company-backend etc.)
          # Pre-v5 workflows hardcoded the legacy form which 404'd on every
          # non-legacy repo and broke sync for 21+ repos. v5 probes both via
          # git ls-remote, prefers prefixed, falls back to legacy, no-ops if
          # neither exists (avoids creating a phantom Gitea repo on first push).
          BRANCH="${{ github.ref_name }}"
          GITEA_REPO_PREFIXED="${{ github.repository_owner }}-${{ github.event.repository.name }}"
          GITEA_REPO_PREFIXED="${GITEA_REPO_PREFIXED,,}"
          GITEA_REPO_LEGACY="${{ github.event.repository.name }}"
          GITEA_REPO_LEGACY="${GITEA_REPO_LEGACY,,}"
          GITEA_BASE="https://ceo:${GITEA_TOKEN}@git.kunjjee.com"

          if git ls-remote "${GITEA_BASE}/ceo/${GITEA_REPO_PREFIXED}.git" HEAD >/dev/null 2>&1; then
            GITEA_REPO="${GITEA_REPO_PREFIXED}"
          elif git ls-remote "${GITEA_BASE}/ceo/${GITEA_REPO_LEGACY}.git" HEAD >/dev/null 2>&1; then
            GITEA_REPO="${GITEA_REPO_LEGACY}"
          else
            echo "[SYNC] status=skip reason=no_gitea_repo tried=${GITEA_REPO_PREFIXED},${GITEA_REPO_LEGACY}"
            exit 0
          fi
          echo "[SYNC] resolved gitea_repo=${GITEA_REPO}"

          # Pause check â€” set GITEA_SYNC_PAUSED=true via /git-sync UI to pause this repo
          if [ "${{ vars.GITEA_SYNC_PAUSED }}" = "true" ]; then
            echo "[SYNC] status=paused branch=${BRANCH}"
            exit 0
          fi

          git remote remove gitea 2>/dev/null || true
          git remote add gitea https://ceo:${GITEA_TOKEN}@git.kunjjee.com/ceo/${GITEA_REPO}.git

          # Fetch only this branch from Gitea (never fetches other branches)
          timeout 60 git fetch gitea "${BRANCH}" 2>/dev/null || true

          if git rev-parse "gitea/${BRANCH}" >/dev/null 2>&1; then
            GITHUB_AHEAD=$(git rev-list "gitea/${BRANCH}..HEAD" --count 2>/dev/null || echo 0)
            GITEA_AHEAD=$(git rev-list "HEAD..gitea/${BRANCH}" --count 2>/dev/null || echo 0)

            if [ "$GITHUB_AHEAD" -gt "0" ] && [ "$GITEA_AHEAD" -gt "0" ]; then
              echo "[SYNC] status=skip reason=diverged branch=${BRANCH} github_ahead=${GITHUB_AHEAD} gitea_ahead=${GITEA_AHEAD}"
              exit 0
            fi

            if [ "$GITEA_AHEAD" -gt "0" ]; then
              echo "[SYNC] status=skip reason=gitea_ahead branch=${BRANCH} gitea_ahead=${GITEA_AHEAD}"
              exit 0
            fi

            if [ "$GITHUB_AHEAD" -eq "0" ] && [ "$GITEA_AHEAD" -eq "0" ]; then
              echo "[SYNC] status=noop branch=${BRANCH}"
              exit 0
            fi
          fi

          echo "[SYNC] status=push branch=${BRANCH}"
          git push gitea HEAD:"${BRANCH}"
